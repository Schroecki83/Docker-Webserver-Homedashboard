services:
  app:
    image: home-dashboard:latest
    build: .
    container_name: home-dashboard
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - FRONIUS_BASE_URL=${FRONIUS_BASE_URL}
      - FRONIUS_USERNAME=${FRONIUS_USERNAME}
      - FRONIUS_PASSWORD=${FRONIUS_PASSWORD}
      - HEATPUMP_HISTORY_DB_PATH=${HEATPUMP_HISTORY_DB_PATH:-/app/data/heatpump-history.db}
      - LUXTRONIC_HOST=${LUXTRONIC_HOST}
      - LUXTRONIC_PORT=${LUXTRONIC_PORT}
      - LUXTRONIC_PASSWORD=${LUXTRONIC_PASSWORD}
      - SHELLY_HT_DEVICES=${SHELLY_HT_DEVICES}
      - SHELLY_GEN1_DEVICES=${SHELLY_GEN1_DEVICES}
      - SHELLY_CLOUD_API_URL=${SHELLY_CLOUD_API_URL}
      - SHELLY_CLOUD_AUTH_TOKEN=${SHELLY_CLOUD_AUTH_TOKEN}
      - PORT=${PORT:-3001}
    volumes:
      - ./data:/app/data
    restart: unless-stopped